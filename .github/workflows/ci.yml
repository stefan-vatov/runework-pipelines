name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        command:
          - npm run build
          - npm run lint
          - npm run typecheck
          - npm test
    steps:
      - uses: actions/checkout@v4
      - name: Checkout runework main
        uses: actions/checkout@v4
        with:
          repository: stefan-vatov/runework
          ref: main
          path: .ci/runework
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install runework workspace dependencies
        working-directory: .ci/runework
        run: npm ci --ignore-scripts
      - name: Link runework main checkout
        run: |
          node ./scripts/install-local-runework.mjs --runework-path .ci/runework/packages/runework
      - run: ${{ matrix.command }}
