name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  RUNEWORK_TARBALL_URL: https://github.com/stefan-vatov/runework/releases/download/v0.2.0/runework-0.2.0.tgz

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        command:
          - npm run build
          - npm run lint
          - npm run typecheck
          - npm test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Link released runework artifact
        run: |
          mkdir -p .ci/runework node_modules
          curl -L "$RUNEWORK_TARBALL_URL" -o .ci/runework.tgz
          tar -xzf .ci/runework.tgz -C .ci/runework
          ln -sfn "$PWD/.ci/runework/package" node_modules/runework
      - run: ${{ matrix.command }}
