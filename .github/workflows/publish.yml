name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  RUNEWORK_TARBALL_URL: https://github.com/stefan-vatov/runework/releases/download/v0.2.0/runework-0.2.0.tgz

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Link released runework artifact
        run: |
          mkdir -p .ci/runework node_modules
          curl -L "$RUNEWORK_TARBALL_URL" -o .ci/runework.tgz
          tar -xzf .ci/runework.tgz -C .ci/runework
          ln -sfn "$PWD/.ci/runework/package" node_modules/runework
      - run: npm run build
      - run: npm test
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: runework-pipelines-tarball
          path: runework-pipelines-*.tgz
      - uses: softprops/action-gh-release@v2
        with:
          files: runework-pipelines-*.tgz
          generate_release_notes: true
