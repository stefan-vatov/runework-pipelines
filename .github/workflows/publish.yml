name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Checkout runework main
        uses: actions/checkout@v4
        with:
          repository: stefan-vatov/runework
          ref: main
          path: .ci/runework
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Install runework workspace dependencies
        working-directory: .ci/runework
        run: npm ci --ignore-scripts
      - name: Link runework main checkout
        run: |
          node ./scripts/install-local-runework.mjs --runework-path .ci/runework/packages/runework
      - run: npm run build
      - run: npm test
      - run: npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: runework-pipelines-tarball
          path: runework-pipelines-*.tgz
      - uses: softprops/action-gh-release@v2
        with:
          files: runework-pipelines-*.tgz
          generate_release_notes: true
